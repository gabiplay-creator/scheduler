<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>공정표 — 인테리어 공사 스케줄러</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --navy-deep:#16233F;
    --navy:#1E3A5F;
    --steel:#3D6690;
    --steel-light:#7C9CB8;
    --paper:#F5F2EA;
    --paper-line:#E1D9C4;
    --card:#FFFFFF;
    --ink:#23262B;
    --ink-soft:#5B5F66;
    --accent:#E2792F;
    --accent-soft:#F6D9BE;
    --green:#4A7C59;
    --danger:#B23A48;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--sans);}
  body{
    background-image:
      linear-gradient(var(--paper-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--paper-line) 1px, transparent 1px);
    background-size: 28px 28px;
    background-attachment: fixed;
    min-height:100vh;
  }
  button{font-family:var(--sans);cursor:pointer;}
  input,select,textarea{font-family:var(--sans);}

  .app{width:1240px;max-width:none;margin:0 auto;padding:0 20px 80px;}

  /* header */
  .header{
    background:var(--navy-deep);
    color:#fff;
    margin:0 -20px 0;
    padding:28px 20px 0;
  }
  .header-inner{width:1240px;max-width:none;margin:0 auto;}
  .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.18em;
    color:var(--accent);
    text-transform:uppercase;
    margin:0 0 6px;
  }
  .title{
    font-size:28px;
    font-weight:800;
    margin:0 0 4px;
    letter-spacing:-.01em;
  }
  .subtitle{color:var(--steel-light);font-size:13px;margin:0 0 18px;}
  .ruler{
    height:22px;
    display:flex;
    align-items:flex-end;
    gap:0;
    overflow:hidden;
    border-top:1px solid rgba(255,255,255,.15);
  }
  .ruler span{
    flex:1;
    border-left:1px solid rgba(255,255,255,.25);
    height:8px;
  }
  .ruler span:nth-child(5n+1){height:14px;border-left:1px solid rgba(255,255,255,.4);}

  .tabs{display:flex;gap:4px;margin-top:16px;}
  .tab{
    background:transparent;border:none;
    color:var(--steel-light);
    font-size:14px;font-weight:700;
    padding:10px 16px;border-radius:8px 8px 0 0;
    border-bottom:3px solid transparent;
  }
  .tab.active{color:#fff;border-bottom:3px solid var(--accent);background:rgba(255,255,255,0.06);}
  .tab:hover{color:#fff;}

  .content{padding-top:24px;}

  .section-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .section-head h2{font-size:19px;margin:0 0 2px;}
  .section-head .eyebrow{color:var(--steel);}

  .btn{
    border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;
    display:inline-flex;align-items:center;gap:6px;
  }
  .btn-primary{background:var(--navy-deep);color:#fff;}
  .btn-primary:hover{background:var(--navy);}
  .btn-accent{background:var(--accent);color:#fff;}
  .btn-accent:hover{background:#c9661f;}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--paper-line);}
  .btn-ghost:hover{border-color:var(--steel);color:var(--navy);}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid #e3c2c6;}
  .btn-danger:hover{background:#fbeff0;}
  .btn-sm{padding:6px 10px;font-size:12px;border-radius:6px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}

  /* cards */
  .card{
    background:var(--card);
    border:1px solid var(--paper-line);
    border-radius:12px;
    padding:18px;
    box-shadow:0 1px 2px rgba(20,20,20,0.03);
  }
  .grid-sites{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
  .site-card{position:relative;cursor:grab;transition:box-shadow .15s, border-color .15s;}
  .site-card:active{cursor:grabbing;}
  .site-card.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent);}
  .drag-handle{position:absolute;top:12px;right:22px;color:var(--paper-line);font-size:16px;letter-spacing:-2px;}
  .site-card .corner{
    position:absolute;top:0;right:0;width:0;height:0;
    border-style:solid;border-width:0 18px 18px 0;
    border-color:transparent var(--accent-soft) transparent transparent;
    border-radius:0 12px 0 0;
  }
  .site-name{font-size:16px;font-weight:800;margin:0 0 2px;}
  .site-addr{font-size:13px;color:var(--ink-soft);margin:0 0 12px;display:flex;gap:6px;align-items:flex-start;}
  .tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
  .tag{
    font-family:var(--mono);font-size:11px;letter-spacing:.03em;
    background:var(--paper);border:1px dashed var(--paper-line);color:var(--ink-soft);
    padding:3px 8px;border-radius:5px;display:inline-flex;align-items:center;gap:4px;
  }
  .tag.ok{color:var(--green);border-color:#bcd8c4;background:#eef6f0;}
  .site-actions{display:flex;gap:6px;flex-wrap:wrap;}

  .empty{
    border:1.5px dashed var(--paper-line);border-radius:12px;padding:36px 20px;text-align:center;color:var(--ink-soft);
  }
  .empty b{color:var(--ink);}

  /* modal */
  .overlay{
    position:fixed;inset:0;background:rgba(22,35,63,.45);
    display:flex;align-items:flex-start;justify-content:center;
    padding:40px 16px;overflow-y:auto;z-index:50;
  }
  .modal{
    background:var(--card);border-radius:14px;max-width:640px;width:100%;
    padding:24px;box-shadow:0 20px 50px rgba(0,0,0,.25);
  }
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .modal-head h3{margin:0;font-size:18px;}
  .close-x{background:none;border:none;color:var(--ink-soft);font-size:18px;padding:4px;border-radius:6px;}
  .close-x:hover{background:var(--paper);}

  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;letter-spacing:.02em;}
  .field input[type=text],.field input[type=date],.field textarea,.field select{
    width:100%;padding:9px 11px;border:1px solid var(--paper-line);border-radius:8px;font-size:14px;background:var(--paper);
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--steel);outline-offset:1px;}
  .field textarea{resize:vertical;min-height:56px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .file-drop{
    border:1.5px dashed var(--paper-line);border-radius:8px;padding:12px;
    display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-soft);background:var(--paper);
  }
  .file-drop input{display:none;}
  .file-drop label{cursor:pointer;background:var(--navy-deep);color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:700;flex-shrink:0;}
  .file-thumb{width:44px;height:44px;border-radius:6px;object-fit:cover;border:1px solid var(--paper-line);flex-shrink:0;}
  .file-badge{
    width:44px;height:44px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:10px;font-weight:800;letter-spacing:.02em;color:#fff;
  }
  .excel-table-wrap{max-height:60vh;overflow:auto;border:1px solid var(--paper-line);border-radius:8px;}
  .excel-table-wrap table{border-collapse:collapse;width:100%;font-size:12.5px;}
  .excel-table-wrap td,.excel-table-wrap th{border:1px solid var(--paper-line);padding:5px 8px;white-space:nowrap;}
  .excel-table-wrap tr:first-child td,.excel-table-wrap tr:first-child th{background:var(--paper);font-weight:700;}
  .modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}

  /* trades / contacts */
  .trade-list{display:flex;flex-direction:column;gap:10px;}
  .trade-row{
    display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--paper-line);border-radius:10px;background:var(--card);
  }
  .trade-swatch{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
  .trade-info{flex:1;min-width:0;}
  .trade-name{font-weight:800;font-size:14px;}
  .trade-note{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .sched-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .chip{
    font-size:11.5px;background:var(--paper);border:1px solid var(--paper-line);border-radius:6px;padding:4px 8px;
    display:inline-flex;align-items:center;gap:6px;
  }
  .chip .x{cursor:pointer;color:var(--ink-soft);font-weight:700;}
  .chip .x:hover{color:var(--danger);}

  /* contacts tab */
  .contact-card{margin-bottom:12px;}
  .contact-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .contact-head .trade-swatch{width:12px;height:12px;}
  .contact-head h4{margin:0;font-size:15px;}
  .contact-note{font-size:12px;color:var(--ink-soft);margin:0 0 10px;font-style:italic;}
  .contact-item{
    display:grid;grid-template-columns:1.2fr 1fr 0.7fr 1.1fr auto;gap:8px;align-items:center;
    padding:8px 0;border-top:1px solid var(--paper-line);font-size:13px;
  }
  .contact-item:first-of-type{border-top:none;}
  .contact-item input{padding:6px 8px;border:1px solid var(--paper-line);border-radius:6px;font-size:13px;width:100%;background:var(--paper);}
  .default-badge{font-family:var(--mono);font-size:10px;background:var(--accent-soft);color:#8a4213;padding:2px 6px;border-radius:4px;letter-spacing:.03em;}

  .vendor-item{
    display:grid;grid-template-columns:1.1fr 0.9fr 1.4fr auto;gap:8px;align-items:center;
    padding:10px 0;border-top:1px solid var(--paper-line);font-size:13px;
  }
  .vendor-item:first-of-type{border-top:none;}
  .vendor-item input{padding:7px 9px;border:1px solid var(--paper-line);border-radius:6px;font-size:13px;width:100%;background:var(--paper);}

  /* calendar */
  .view-toggle{display:flex;border:1px solid var(--paper-line);border-radius:8px;overflow:hidden;}
  .view-toggle button{background:var(--card);border:none;padding:8px 14px;font-size:13px;font-weight:700;color:var(--ink-soft);}
  .view-toggle button.active{background:var(--navy-deep);color:#fff;}
  .view-toggle button:not(:last-child){border-right:1px solid var(--paper-line);}

  .agenda-group{margin-bottom:18px;}
  .agenda-month{
    font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:var(--steel);
    text-transform:uppercase;margin:0 0 8px;padding-bottom:6px;border-bottom:1px dashed var(--paper-line);
  }
  .agenda-item{
    display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--paper-line);border-radius:10px;margin-bottom:6px;background:var(--card);
  }
  .agenda-item.past{opacity:.55;}
  .agenda-date{
    font-family:var(--mono);font-size:12px;font-weight:800;color:var(--navy);background:var(--paper);
    border-radius:6px;padding:6px 8px;text-align:center;min-width:52px;line-height:1.15;flex-shrink:0;
  }
  .agenda-date .dow{display:block;font-size:9.5px;color:var(--ink-soft);font-weight:600;}
  .agenda-swatch{width:4px;align-self:stretch;border-radius:3px;flex-shrink:0;}
  .agenda-body{flex:1;min-width:0;}
  .agenda-title{font-weight:800;font-size:13.5px;}
  .agenda-sub{font-size:12px;color:var(--ink-soft);margin-top:1px;}

  .cal-nav{display:flex;align-items:center;gap:10px;}
  .cal-nav button{background:var(--card);border:1px solid var(--paper-line);border-radius:8px;width:32px;height:32px;font-size:15px;}
  .cal-month{font-size:16px;font-weight:800;font-family:var(--mono);min-width:110px;text-align:center;}
  .cal-filter select{padding:8px 10px;border-radius:8px;border:1px solid var(--paper-line);font-size:13px;background:var(--card);}
  .cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:14px;}
  .cal-dow{font-family:var(--mono);font-size:11px;color:var(--ink-soft);text-align:center;padding-bottom:4px;letter-spacing:.05em;}
  .cal-two-month{display:grid;grid-template-columns:1fr;gap:22px;align-items:start;}
  .cal-month-card{padding:16px;}
  .cal-month-title{font-family:var(--mono);font-size:14px;font-weight:800;color:var(--navy);margin:0 0 4px;}
  .cal-legend-card{margin-top:14px;padding:14px 18px;}
  @media (max-width:900px){
    .app,.header-inner{width:1180px;}
  }
  .week-row{margin-bottom:0;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;}
  .cal-cell{
    background:var(--card);border:1px solid var(--paper-line);border-radius:0;min-height:168px;padding:0;
    display:flex;flex-direction:column;gap:0;cursor:pointer;overflow:hidden;
  }
  .cal-cell.empty-cell{background:transparent;border:none;cursor:default;}
  .cal-cell.today{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent);}
  .cal-cell.picked{border-color:var(--navy);box-shadow:inset 0 0 0 1.5px var(--navy);}
  .cal-cell.drag-over{border-color:var(--accent);box-shadow:inset 0 0 0 2px var(--accent);background:var(--accent-soft);}
  .cal-cell:hover:not(.empty-cell){border-color:var(--steel);}
  .cal-date{font-family:var(--mono);font-size:11px;color:var(--ink-soft);padding:4px 5px 2px;display:block;line-height:1;}
  .gantt-bar{
    height:15px;border-radius:0;flex-shrink:0;display:flex;align-items:center;overflow:hidden;box-sizing:border-box;
  }
  .gantt-bar.empty{background:transparent;}
  .gantt-bar.lane-gap{margin-top:5px;}
  .gantt-bar.round-l{border-radius:4px 0 0 4px;margin-left:1px;}
  .gantt-bar.round-r{border-radius:0 4px 4px 0;margin-right:1px;}
  .gantt-bar.round-l.round-r{border-radius:4px;margin-left:1px;margin-right:1px;}
  .gantt-bar.project{
    height:19px;border:2.5px solid var(--accent);box-shadow:0 2px 4px rgba(22,35,63,0.35);
  }
  .gantt-bar.project .gantt-label{font-weight:800;letter-spacing:.02em;}
  .gantt-label{
    font-size:9.5px;color:#fff;font-weight:700;padding-left:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .site-lane-wrap{display:flex;flex-direction:column;flex:1;min-height:0;gap:3px;}
  .site-day-block{
    border:0;border-radius:0;padding:1px 3px;
    display:flex;flex-direction:column;gap:0;overflow:hidden;min-height:0;
  }
  .site-day-block.empty-lane{background:transparent !important;}
  .trade-slot{
    height:18px;min-height:18px;display:flex;align-items:center;overflow:hidden;
  }
  .trade-day-chip{
    width:100%;height:14px;border-radius:2px;display:flex;align-items:center;padding:1px 5px;overflow:hidden;
    box-shadow:none;margin-bottom:4px;box-sizing:border-box;cursor:grab;
  }
  .trade-day-chip:active{cursor:grabbing;}
  .trade-day-chip span{font-size:9.5px;color:#fff;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .site-name-fill{
    font-size:9px;line-height:1.2;color:var(--ink);font-weight:800;letter-spacing:.01em;
    padding:3px 5px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
    opacity:.75;
  }

  .cal-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--ink-soft);}
  .legend-dot{width:9px;height:9px;border-radius:3px;}

  .daypanel{margin-top:16px;}
  .day-sched{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:12px;border:1px solid var(--paper-line);border-radius:10px;margin-bottom:8px;}
  .day-sched .swatch-bar{width:4px;border-radius:3px;align-self:stretch;}

  .footer-note{margin-top:40px;font-size:12px;color:var(--ink-soft);text-align:center;font-family:var(--mono);}

  @media (max-width:640px){
    .row2{grid-template-columns:1fr;}
    .contact-item{grid-template-columns:1fr;gap:4px;}
    .tabs{overflow-x:auto;}
  }
</style>
</head>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ================= REAL-TIME SHARED SYNC (Firebase Firestore) =================
   To let multiple people view/edit this scheduler together with live updates:
   1. Go to https://console.firebase.google.com → create a free project
   2. In the project, open "Build → Firestore Database" → Create database
      → start in test mode (or use the security rules note in the README)
   3. Open Project settings (gear icon) → General → "Your apps" → add a Web app
   4. Copy the firebaseConfig values it gives you into FIREBASE_CONFIG below
   5. Save this file, commit, and push — every visitor will now share the same
      live data instead of each browser having its own separate copy.
   Until you fill this in, the app keeps working exactly as before (data saved
   only in this browser's localStorage) — nothing breaks either way.
================================================================================= */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyC1CKmlgT01s3woqxZJ4G8DFwNBedEsrnA",
  authDomain: "scheduler-12e2d.firebaseapp.com",
  projectId: "scheduler-12e2d",
  storageBucket: "scheduler-12e2d.firebasestorage.app",
  messagingSenderId: "828090719410",
  appId: "1:828090719410:web:697ac46eb901cc7742fdab",
};

let _fbApp = null, _fbDb = null;
function fbReady(){
  if(_fbDb) return true;
  if(typeof firebase === "undefined") return false;
  if(!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey.startsWith("YOUR_")) return false;
  try{
    _fbApp = firebase.initializeApp(FIREBASE_CONFIG);
    _fbDb = firebase.firestore();
    return true;
  }catch(e){ console.error("Firebase init failed:", e); return false; }
}
function fbCollection(name){ return _fbDb.collection(name); }

// Drop-in replacement for useState + localStorage persistence, but when Firebase is
// configured it also keeps the data live-synced (in real time) across everyone using
// the app: each record is its own Firestore document (by its `id`), so different
// people editing different sites/trades/schedules at once don't clobber each other.
function useSyncedState(collectionName, initialValue){
  const [state, setStateRaw] = useState(() => loadLS("scheduler:"+collectionName, initialValue));
  const stateRef = useRef(state);
  stateRef.current = state;

  useEffect(() => {
    if(!fbReady()) return;
    let firstSnapshot = true;
    const unsub = fbCollection(collectionName).onSnapshot(snap => {
      if(firstSnapshot && snap.empty){
        firstSnapshot = false;
        const seed = (stateRef.current && stateRef.current.length) ? stateRef.current : initialValue;
        if(seed && seed.length){
          const batch = _fbDb.batch();
          seed.forEach(item => batch.set(fbCollection(collectionName).doc(String(item.id)), item));
          batch.commit().catch(err => console.error("initial seed failed:", err));
        }
        return; // the batch write above will trigger another snapshot with the real data
      }
      firstSnapshot = false;
      const list = snap.docs.map(d => d.data());
      setStateRaw(list);
      saveLS("scheduler:"+collectionName, list);
    }, err => console.error("sync error on", collectionName, err));
    return () => unsub();
  }, [collectionName]);

  const setState = useCallback((updater) => {
    setStateRaw(prev => {
      const next = typeof updater==="function" ? updater(prev) : updater;
      saveLS("scheduler:"+collectionName, next);
      if(fbReady()){
        const batch = _fbDb.batch();
        let ops = 0;
        const prevIds = new Set(prev.map(x=>x.id));
        next.forEach(item => {
          const prevItem = prev.find(p=>p.id===item.id);
          if(!prevItem || JSON.stringify(prevItem)!==JSON.stringify(item)){
            batch.set(fbCollection(collectionName).doc(String(item.id)), item);
            ops++;
          }
        });
        prev.forEach(item => {
          if(!next.some(n=>n.id===item.id)){
            batch.delete(fbCollection(collectionName).doc(String(item.id)));
            ops++;
          }
        });
        if(ops>0) batch.commit().catch(err => console.error("sync write failed:", err));
      }
      return next;
    });
  }, [collectionName]);

  return [state, setState];
}

const DOW = ["일","월","화","수","목","금","토"];
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);
const pad = n => String(n).padStart(2,"0");
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
function scheduleRange(sc){
  const start = sc.startDate || sc.date;
  const end = sc.endDate || sc.startDate || sc.date;
  return end < start ? { start: end, end: start } : { start, end };
}
function daySpan(sc){
  const { start, end } = scheduleRange(sc);
  return Math.round((new Date(end) - new Date(start)) / 86400000) + 1;
}
function shiftDateStr(dateStr, deltaDays){
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate() + deltaDays);
  return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`;
}
function daysBetweenStr(fromStr, toStr){
  const [ay,am,ad] = fromStr.split("-").map(Number);
  const [by,bm,bd] = toStr.split("-").map(Number);
  const a = new Date(ay, am-1, ad), b = new Date(by, bm-1, bd);
  return Math.round((b - a) / 86400000);
}

function loadLS(key, fallback){
  try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
  catch(e){ return fallback; }
}
function saveLS(key, value){
  try{ localStorage.setItem(key, JSON.stringify(value)); }
  catch(e){ console.error("저장 실패 (용량 초과일 수 있어요):", e); alert("저장에 실패했습니다. 업로드한 이미지 용량이 너무 크지 않은지 확인해주세요."); }
}
function fileToDataUrl(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function isSpreadsheetName(name=""){ return /\.(xlsx|xls|csv)$/i.test(name); }
function isPdfName(name=""){ return /\.pdf$/i.test(name); }
function extBadge(name=""){
  const m = name.match(/\.([a-zA-Z0-9]+)$/);
  return m ? m[1].toUpperCase().slice(0,4) : "FILE";
}
function excelDataUrlToHtml(dataUrl){
  try{
    const base64 = dataUrl.split(",")[1];
    const wb = XLSX.read(base64, { type: "base64" });
    const sheetName = wb.SheetNames[0];
    return XLSX.utils.sheet_to_html(wb.Sheets[sheetName]);
  }catch(e){
    console.error(e);
    return "<p>미리보기를 불러올 수 없습니다.</p>";
  }
}

/* ---------- root ---------- */
function App(){
  const [tab, setTab] = useState("sites");
  const [trades, setTrades] = useSyncedState("trades", DEFAULT_TRADES);
  const [sites, setSites] = useSyncedState("sites", []);
  const [schedules, setSchedules] = useSyncedState("schedules", []);
  const [vendors, setVendors] = useSyncedState("vendors", DEFAULT_VENDORS);
  const [synced, setSynced] = useState(false);

  useEffect(() => { setSynced(fbReady()); }, []);

  // if a new default trade category gets added to the app later (like "메지" was),
  // make sure everyone's existing data picks it up automatically instead of only
  // brand-new installs seeing it
  useEffect(() => {
    const missing = DEFAULT_TRADES.filter(dt => !trades.some(t => t.id===dt.id));
    if(missing.length) setTrades(prev => [...prev, ...missing.filter(dt => !prev.some(t=>t.id===dt.id))]);
  }, [trades]);

  // give every site a display `order` value, sorted by its overall-project start date
  // the first time (sites without a start date go last). After that, order is only
  // ever changed by adding a new site (auto-placed by date) or by dragging a card
  // (see SitesTab) — so a manual drag reorder is never silently undone.
  useEffect(() => {
    if(sites.length===0) return;
    const missingOrder = sites.some(s => s.order===undefined || s.order===null);
    if(!missingOrder) return;
    const dateKey = s => s.projectStart || "9999-99-99";
    const sorted = [...sites].sort((a,b) => dateKey(a).localeCompare(dateKey(b)) || (a.createdAt||0)-(b.createdAt||0));
    setSites(sorted.map((s,i) => ({ ...s, order: i*10 })));
  }, [sites]);

  const rulerTicks = Array.from({length: 40});

  return (
    <div className="app">
      <div className="header">
        <div className="header-inner">
          <p className="eyebrow">PROJECT SCHEDULE / 도면 기준</p>
          <h1 className="title">공정표</h1>
          <p className="subtitle">현장 · 공사 담당자 · 캘린더를 한곳에서 관리합니다</p>
          <div className="tabs">
            <button className={"tab" + (tab==="sites"?" active":"")} onClick={()=>setTab("sites")}>현장관리</button>
            <button className={"tab" + (tab==="calendar"?" active":"")} onClick={()=>setTab("calendar")}>공사캘린더</button>
            <button className={"tab" + (tab==="contacts"?" active":"")} onClick={()=>setTab("contacts")}>담당자관리</button>
            <button className={"tab" + (tab==="vendors"?" active":"")} onClick={()=>setTab("vendors")}>거래처관리</button>
          </div>
        </div>
        <div className="ruler">{rulerTicks.map((_,i)=><span key={i}/>)}</div>
      </div>

      <div className="content">
        {tab==="sites" && (
          <SitesTab sites={sites} setSites={setSites} trades={trades} schedules={schedules} setSchedules={setSchedules} />
        )}
        {tab==="calendar" && (
          <CalendarTab sites={sites} trades={trades} schedules={schedules} setSchedules={setSchedules} />
        )}
        {tab==="contacts" && (
          <ContactsTab trades={trades} setTrades={setTrades} schedules={schedules} setSchedules={setSchedules} />
        )}
        {tab==="vendors" && (
          <VendorsTab vendors={vendors} setVendors={setVendors} />
        )}
      </div>

      <p className="footer-note">
        {synced ? "🟢 LIVE SYNC ON — 다른 사람의 수정이 실시간으로 반영됩니다" : "DATA IS STORED LOCALLY IN THIS BROWSER — 이 브라우저에만 저장됩니다 (실시간 공유를 켜려면 README 참고)"}
      </p>
    </div>
  );
}

/* ---------- Sites tab ---------- */
function SitesTab({ sites, setSites, trades, schedules, setSchedules }){
  const [showAdd, setShowAdd] = useState(false);
  const [detailSiteId, setDetailSiteId] = useState(null);
  const [viewFile, setViewFile] = useState(null); // {name, dataUrl, isImage}
  const [dragOverSiteId, setDragOverSiteId] = useState(null);

  const detailSite = sites.find(s => s.id === detailSiteId);
  const orderedSites = [...sites].sort((a,b) => (a.order??0) - (b.order??0));

  function addSite(site){
    setSites(prev => {
      const ordered = [...prev].sort((a,b) => (a.order??0)-(b.order??0));
      const newDate = site.projectStart || "9999-99-99";
      let insertAt = ordered.findIndex(s => (s.projectStart || "9999-99-99") > newDate);
      if(insertAt===-1) insertAt = ordered.length;
      const prevOrder = insertAt>0 ? (ordered[insertAt-1].order ?? 0) : (ordered.length ? (ordered[0].order??0)-10 : 0);
      const nextOrder = insertAt<ordered.length ? (ordered[insertAt].order ?? prevOrder+10) : prevOrder+10;
      return [...prev, { ...site, id: uid(), createdAt: Date.now(), order: (prevOrder+nextOrder)/2 }];
    });
    setShowAdd(false);
  }
  function updateSite(id, patch){
    setSites(prev => prev.map(s => s.id===id ? {...s, ...patch} : s));
  }
  function deleteSite(id){
    if(!confirm("이 현장을 삭제하면 관련 일정도 함께 삭제됩니다. 계속할까요?")) return;
    setSites(prev => prev.filter(s => s.id!==id));
    setSchedules(prev => prev.filter(sc => sc.siteId!==id));
    if(detailSiteId===id) setDetailSiteId(null);
  }
  function reorderSites(draggedId, targetId){
    if(draggedId===targetId) return;
    setSites(prev => {
      const ordered = [...prev].sort((a,b) => (a.order??0)-(b.order??0));
      const fromIdx = ordered.findIndex(s=>s.id===draggedId);
      const toIdx = ordered.findIndex(s=>s.id===targetId);
      if(fromIdx===-1 || toIdx===-1) return prev;
      const [moved] = ordered.splice(fromIdx,1);
      ordered.splice(toIdx,0,moved);
      return ordered.map((s,i)=>({...s, order:i*10}));
    });
  }

  return (
    <div>
      <div className="section-head">
        <div>
          <p className="eyebrow">SITES</p>
          <h2>공사 현장</h2>
        </div>
        <button className="btn btn-accent" onClick={()=>setShowAdd(true)}>+ 새 현장 추가</button>
      </div>

      {sites.length===0 ? (
        <div className="empty"><b>등록된 현장이 없습니다.</b><br/>“새 현장 추가”를 눌러 주소와 도면을 등록해보세요.</div>
      ) : (
        <div className="grid-sites">
          {orderedSites.map(site => (
            <div
              className={"card site-card" + (dragOverSiteId===site.id ? " drag-over" : "")}
              key={site.id}
              draggable
              onDragStart={e=>{ e.dataTransfer.effectAllowed="move"; e.dataTransfer.setData("text/plain", site.id); }}
              onDragOver={e=>e.preventDefault()}
              onDragEnter={e=>{ e.preventDefault(); setDragOverSiteId(site.id); }}
              onDragLeave={()=>{ if(dragOverSiteId===site.id) setDragOverSiteId(null); }}
              onDrop={e=>{ e.preventDefault(); setDragOverSiteId(null); reorderSites(e.dataTransfer.getData("text/plain"), site.id); }}
              onDragEnd={()=>setDragOverSiteId(null)}
              title="드래그해서 순서를 바꿀 수 있어요"
            >
              <div className="corner" />
              <span className="drag-handle">⠿</span>
              <p className="site-name">{site.name}</p>
              <p className="site-addr">📍 {site.address || "주소 미등록"}</p>
              {site.projectStart && site.projectEnd && (
                <p className="site-addr">🗂 전체 공사: {site.projectStart} ~ {site.projectEnd} ({daySpan({startDate:site.projectStart, endDate:site.projectEnd})}일)</p>
              )}
              {site.officePhone && <p className="site-addr">🏢 {site.officeName || "관리사무소"} · {site.officePhone}</p>}
              <div className="tag-row">
                <span className={"tag" + (site.floorPlan ? " ok":"")}>{site.floorPlan ? "도면 등록됨" : "도면 없음"}</span>
                <span className={"tag" + (site.estimate ? " ok":"")}>{site.estimate ? "견적서 등록됨" : "견적서 없음"}</span>
                <span className={"tag" + (site.officePhone ? " ok":"")}>{site.officePhone ? "관리사무소 등록됨" : "관리사무소 없음"}</span>
                <span className="tag">{schedules.filter(sc=>sc.siteId===site.id).length}건 일정</span>
              </div>
              <div className="site-actions">
                <button className="btn btn-ghost btn-sm" onClick={()=>setDetailSiteId(site.id)}>일정 관리</button>
                {site.floorPlan && <button className="btn btn-ghost btn-sm" onClick={()=>setViewFile(site.floorPlan)}>도면 보기</button>}
                {site.estimate && <button className="btn btn-ghost btn-sm" onClick={()=>setViewFile(site.estimate)}>견적서 보기</button>}
                <button className="btn btn-danger btn-sm" onClick={()=>deleteSite(site.id)}>삭제</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {showAdd && <SiteFormModal onClose={()=>setShowAdd(false)} onSave={addSite} />}
      {detailSite && (
        <SiteDetailModal
          site={detailSite}
          trades={trades}
          schedules={schedules.filter(sc=>sc.siteId===detailSite.id)}
          onClose={()=>setDetailSiteId(null)}
          onUpdateSite={patch=>updateSite(detailSite.id, patch)}
          onAddSchedule={sc=>setSchedules(prev=>[...prev, {...sc, id: uid(), siteId: detailSite.id}])}
          onDeleteSchedule={id=>setSchedules(prev=>prev.filter(s=>s.id!==id))}
          onViewFile={setViewFile}
        />
      )}
      {viewFile && <FileViewerModal file={viewFile} onClose={()=>setViewFile(null)} />}
    </div>
  );
}

    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 650*1024){
      alert("파일이 너무 큽니다 (650KB 이하 권장). 여러 사람과 실시간으로 공유되는 항목이라 용량 제한이 있어요. 이미지를 압축하거나 캡처본으로 올려주세요.");
      return;
    }
    const dataUrl = await fileToDataUrl(file);
    setter({
      name: file.name,
      dataUrl,
      isImage: file.type.startsWith("image/"),
      isSpreadsheet: isSpreadsheetName(file.name),
      isPdf: isPdfName(file.name) || file.type === "application/pdf",
    });
  }

      name: name.trim(), address: address.trim(), memo: memo.trim(), floorPlan, estimate,
      officeName: officeName.trim(), officePhone: officePhone.trim(),
      projectStart, projectEnd,
    });

          <div className="field">
            <label>전체 공사 시작일</label>
            <input type="date" value={projectStart} onChange={e=>setProjectStart(e.target.value)} />
          </div>
          <div className="field">

function AddScheduleInline({ trade, onCancel, onAdd }){
  const [startDate, setStartDate] = useState(todayStr());
  const [endDate, setEndDate] = useState(todayStr());
  const [contactId, setContactId] = useState(trade.contacts[0]?.id || "");
  const [memo, setMemo] = useState("");

  function handleStartChange(v){
    setStartDate(v);
    if(endDate < v) setEndDate(v);
  }

  function submit(){
    if(!startDate || !endDate){ alert("시작일과 종료일을 입력해주세요."); return; }
    onAdd({ startDate, endDate: endDate < startDate ? startDate : endDate, contactId, memo });
  }

  return (
    <div className="row2" style={{marginTop:8, background:"var(--paper)", padding:10, borderRadius:8}}>
      <div className="field" style={{marginBottom:0}}>
        <label>시작일</label>
        <input type="date" value={startDate} onChange={e=>handleStartChange(e.target.value)} />
      </div>
      <div className="field" style={{marginBottom:0}}>
        <label>종료일 (총 기간)</label>
        <input type="date" value={endDate} min={startDate} onChange={e=>setEndDate(e.target.value)} />
      </div>
      <div className="field" style={{marginBottom:0}}>
        <label>담당자</label>
        <select value={contactId} onChange={e=>setContactId(e.target.value)}>
          {trade.contacts.map(c => <option value={c.id} key={c.id}>{c.name}{c.isDefault ? " (기본)" : ""}</option>)}
        </select>
      </div>
      <div className="field" style={{marginBottom:0}}>
        <label>메모</label>
        <input type="text" value={memo} onChange={e=>setMemo(e.target.value)} placeholder="예: 실측 약속, 오전 시공 등" />
      </div>
      <div style={{gridColumn:"1 / -1", display:"flex", justifyContent:"flex-end", gap:8, marginTop:4}}>
        <button className="btn btn-ghost btn-sm" onClick={onCancel}>취소</button>
        <button className="btn btn-primary btn-sm" onClick={submit}>추가</button>
      </div>
    </div>
  );
}

function FilePreviewThumb({ file }){
  if(!file) return null;
  if(file.isImage) return <img className="file-thumb" src={file.dataUrl} />;
  if(file.isSpreadsheet ?? isSpreadsheetName(file.name)) return <div className="file-badge" style={{background:"var(--green)"}}>{extBadge(file.name)}</div>;
  if(file.isPdf ?? isPdfName(file.name)) return <div className="file-badge" style={{background:"var(--danger)"}}>PDF</div>;
  return <div className="file-badge" style={{background:"var(--ink-soft)"}}>{extBadge(file.name)}</div>;
}

function FileViewerModal({ file, onClose }){
  // fall back to name/mime sniffing for files saved before these flags existed
  const isImage = !!file.isImage;
  const isSpreadsheet = file.isSpreadsheet ?? isSpreadsheetName(file.name);
  const isPdf = file.isPdf ?? (isPdfName(file.name) || (file.dataUrl || "").startsWith("data:application/pdf"));
  const tableHtml = useMemo(() => isSpreadsheet ? excelDataUrlToHtml(file.dataUrl) : null, [file]);
  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget && onClose()}>
      <div className="modal" style={{maxWidth: isSpreadsheet ? 900 : 800}}>
        <div className="modal-head">
          <h3>{file.name}</h3>
          <button className="close-x" onClick={onClose}>✕</button>
        </div>
        {isImage && <img src={file.dataUrl} style={{width:"100%", borderRadius:8}} />}
        {isPdf && <embed src={file.dataUrl} type="application/pdf" style={{width:"100%", height:"70vh", borderRadius:8}} />}
        {isSpreadsheet && (
          <div className="excel-table-wrap" dangerouslySetInnerHTML={{__html: tableHtml}} />
        )}
        {!isImage && !isPdf && !isSpreadsheet && (
          <p style={{color:"var(--ink-soft)", fontSize:13}}>이 파일 형식은 미리보기를 지원하지 않습니다. 다운로드해서 확인해주세요.</p>
        )}
        <div className="modal-footer">
          <a className="btn btn-primary" href={file.dataUrl} download={file.name}>다운로드</a>
        </div>
      </div>
    </div>
  );
}

/* ---------- Calendar tab ---------- */
function CalendarTab({ sites, trades, schedules, setSchedules }){
  const [view, setView] = useState("month"); // "month" | "agenda"
  const [cursor, setCursor] = useState(() => { const d = new Date(); return {y: d.getFullYear(), m: d.getMonth()}; });
  const [siteFilter, setSiteFilter] = useState("all");
  const [selectedDate, setSelectedDate] = useState(null); // full "YYYY-MM-DD" string, or null
  const [dragOverDate, setDragOverDate] = useState(null);

  function handleChipDragStart(e, scheduleId, originDate){
    e.stopPropagation();
    e.dataTransfer.effectAllowed = "move";
    e.dataTransfer.setData("text/plain", JSON.stringify({ scheduleId, originDate }));
  }
  function handleCellDrop(e, dropDateStr){
    e.preventDefault();
    setDragOverDate(null);
    let payload;
    try{ payload = JSON.parse(e.dataTransfer.getData("text/plain")); }catch(err){ return; }
    if(!payload || !payload.scheduleId || !payload.originDate || !dropDateStr) return;
    const delta = daysBetweenStr(payload.originDate, dropDateStr);
    if(delta===0) return;
    setSchedules(prev => prev.map(sc => {
      if(sc.id!==payload.scheduleId) return sc;
      const { date, ...rest } = sc;
      const { start, end } = scheduleRange(sc);
      return { ...rest, startDate: shiftDateStr(start, delta), endDate: shiftDateStr(end, delta) };
    }));
  }
  function deleteScheduleById(scheduleId, label){
    if(!confirm(`"${label}" 일정을 삭제할까요?`)) return;
    setSchedules(prev => prev.filter(sc => sc.id!==scheduleId));
  }

  const tradeById = useMemo(() => Object.fromEntries(trades.map(t=>[t.id,t])), [trades]);
  const siteById = useMemo(() => Object.fromEntries(sites.map(s=>[s.id,s])), [sites]);

  const filtered = schedules.filter(sc => siteFilter==="all" || sc.siteId===siteFilter);

  function addMonths({y, m}, delta){
    let nm = m + delta, ny = y;
    while(nm<0){ nm+=12; ny--; }
    while(nm>11){ nm-=12; ny++; }
    return { y: ny, m: nm };
  }

  // build full weeks (leading/trailing blanks included) so bars line up cleanly row by row
  function buildWeeks(y, m){
    const firstDow = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const totalCells = firstDow + daysInMonth;
    const trailing = (7 - (totalCells % 7)) % 7;
    const cellsFull = [];
    for(let i=0;i<firstDow;i++) cellsFull.push(null);
    for(let d=1; d<=daysInMonth; d++) cellsFull.push(d);
    for(let i=0;i<trailing;i++) cellsFull.push(null);
    const out = [];
    for(let i=0;i<cellsFull.length;i+=7) out.push(cellsFull.slice(i,i+7));
    return out;
  }

  function dateStrFor(y, m, day){ return day ? `${y}-${pad(m+1)}-${pad(day)}` : null; }

  function schedulesOn(dateStr){
    if(!dateStr) return [];
    return filtered.filter(sc => { const {start,end} = scheduleRange(sc); return dateStr>=start && dateStr<=end; });
  }

  const projectItems = useMemo(() => sites
    .filter(s => (siteFilter==="all" || s.id===siteFilter) && s.projectStart && s.projectEnd)
    .map(s => ({ id:"proj-"+s.id, isProject:true, siteId:s.id, tradeId:null, startDate:s.projectStart, endDate:s.projectEnd })),
    [sites, siteFilter]);

  // a distinct color per site for the overall-project header bar (stable regardless of filter)
  const siteColorMap = useMemo(() => Object.fromEntries(
    sites.map((s, i) => [s.id, PROJECT_COLOR_POOL[i % PROJECT_COLOR_POOL.length]])
  ), [sites]);

  const relevantSites = useMemo(() => sites.filter(s => siteFilter==="all" || s.id===siteFilter), [sites, siteFilter]);

  // display range for each site's header bar: its registered project period, or (if none
  // was set) the span from its earliest to latest trade schedule
  const siteRanges = useMemo(() => {
    const map = {};
    relevantSites.forEach(site => {
      const proj = projectItems.find(p => p.siteId===site.id);
      if(proj){ map[site.id] = scheduleRange(proj); return; }
      const siteSchedules = filtered.filter(sc => sc.siteId===site.id);
      if(siteSchedules.length===0){ map[site.id] = null; return; }
      const ranges = siteSchedules.map(scheduleRange);
      map[site.id] = {
        start: ranges.reduce((a,r) => r.start<a ? r.start : a, ranges[0].start),
        end: ranges.reduce((a,r) => r.end>a ? r.end : a, ranges[0].end),
      };
    });
    return map;
  }, [relevantSites, projectItems, filtered]);

  // 해당 날짜에 실제 진행 중인 현장만 블록으로 표시합니다.
  // 현장별 배경색으로 영역을 구분하고, 그 색상 위에 일자별 공정을 칩 형태로 넣습니다.
  function dayItems(dateStr){
    if(!dateStr) return [];
    return relevantSites.map(site => {
      const range = siteRanges[site.id];
      const headerActive = range && dateStr>=range.start && dateStr<=range.end;
      const siteTradesToday = trades
        .map(t => {
          const sc = filtered.find(s => s.siteId===site.id && s.tradeId===t.id && (() => {
            const { start, end } = scheduleRange(s); return dateStr>=start && dateStr<=end;
          })());
          if(!sc) return null;
          const r = scheduleRange(sc);
          return { trade:t, start:r.start, end:r.end, id: sc.id, siteId: site.id };
        })
        .filter(Boolean);
      return { site, active: !!headerActive || siteTradesToday.length>0, start:range?.start, end:range?.end, trades:siteTradesToday };
    });
  }

  function changeMonth(delta){
    setCursor(prev => addMonths(prev, delta));
    setSelectedDate(null);
  }

  const todayFull = todayStr();

  // agenda view: every schedule across all time (respecting the site filter), grouped by start month
  const agendaGroups = useMemo(() => {
    const combined = [...filtered, ...projectItems];
    const sorted = combined.sort((a,b) => scheduleRange(a).start.localeCompare(scheduleRange(b).start));
    const groups = {};
    sorted.forEach(sc => {
      const key = scheduleRange(sc).start.slice(0,7); // YYYY-MM
      if(!groups[key]) groups[key] = [];
      groups[key].push(sc);
    });
    return Object.entries(groups);
  }, [filtered, projectItems]);

  // renders one month's dow-row + week grid (used twice, stacked vertically)
  function renderMonthCard(monthCursor){
    const { y, m } = monthCursor;
    const weeks = buildWeeks(y, m);
    return (
      <div className="card cal-month-card" key={`${y}-${m}`}>
        <p className="cal-month-title">{y}. {pad(m+1)}</p>
        <div className="cal-dow-row">
          {DOW.map(d => <div className="cal-dow" key={d}>{d}</div>)}
        </div>
        {weeks.map((weekDays, wi) => {
          const dateStrs = weekDays.map(day => dateStrFor(y, m, day));
          return (
            <div className="week-row" key={wi}>
              <div className="cal-grid">
                {weekDays.map((day, di) => {
                  const dateStr = dateStrs[di];
                  return (
                    <div
                      key={di}
                      className={"cal-cell" + (!day ? " empty-cell" : "") + (dateStr===todayFull ? " today" : "") + (selectedDate===dateStr && day ? " picked" : "") + (dragOverDate===dateStr && day ? " drag-over" : "")}
                      onClick={()=> day && setSelectedDate(dateStr)}
                      onDragOver={e=>{ if(day) e.preventDefault(); }}
                      onDragEnter={e=>{ if(day){ e.preventDefault(); setDragOverDate(dateStr); } }}
                      onDragLeave={()=>{ if(dragOverDate===dateStr) setDragOverDate(null); }}
                      onDrop={e=>{ if(day) handleCellDrop(e, dateStr); }}
                    >
                      {day && <span className="cal-date">{day}</span>}
                      {day && (
                        <div className="site-lane-wrap">
                          {dayItems(dateStr).map((item, idx) => {
                            const siteColor = siteColorMap[item.site.id];
                            const titleText = `${item.site.name}${item.start && item.end ? ` 전체공사 (${item.start} ~ ${item.end})` : ""}`;
                            const laneStyle = { flex: relevantSites.length ? `1 1 ${100/relevantSites.length}%` : "1", background: item.active ? siteColor + "48" : "transparent" };
                            const tradeSlots = Array.from({length:3}, (_, i) => item.trades[i] || null);
                            return (
                              <div
                                key={idx}
                                className={"site-day-block" + (!item.active ? " empty-lane" : "")}
                                style={laneStyle}
                                title={item.active ? titleText : ""}
                              >
                                {item.trades.length>0 ? (
                                  tradeSlots.map((tr, ti) => (
                                    <div className="trade-slot" key={ti}>
                                      {tr && (
                                        <div
                                          className="trade-day-chip"
                                          style={{background: tr.trade.color}}
                                          title={`${item.site.name} · ${tr.trade.name} (${tr.start} ~ ${tr.end}) — 드래그로 날짜 이동, 클릭하면 삭제`}
                                          draggable
                                          onDragStart={e=>handleChipDragStart(e, tr.id, dateStr)}
                                          onDragEnd={()=>setDragOverDate(null)}
                                          onClick={e=>{ e.stopPropagation(); deleteScheduleById(tr.id, `${item.site.name} · ${tr.trade.name}`); }}
                                        >
                                          <span>{tr.trade.name}</span>
                                        </div>
                                      )}
                                    </div>
                                  ))
                                ) : item.active ? (
                                  <div className="site-name-fill">{item.site.name}</div>
                                ) : null}
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  return (
    <div>
      <div className="section-head">
        <div>
          <p className="eyebrow">SCHEDULE OVERVIEW</p>
          <h2>공사 캘린더</h2>
        </div>
        <div style={{display:"flex", gap:10, alignItems:"center", flexWrap:"wrap"}}>
          <div className="view-toggle">
            <button className={view==="month"?"active":""} onClick={()=>setView("month")}>달력형</button>
            <button className={view==="agenda"?"active":""} onClick={()=>setView("agenda")}>전체 목록형</button>
          </div>
          <div className="cal-filter">
            <select value={siteFilter} onChange={e=>{setSiteFilter(e.target.value); setSelectedDate(null);}}>
              <option value="all">전체 현장</option>
              {sites.map(s => <option value={s.id} key={s.id}>{s.name}</option>)}
            </select>
          </div>
          {view==="month" && (
            <div className="cal-nav">
              <button onClick={()=>changeMonth(-1)}>‹</button>
              <span className="cal-month">{cursor.y}.{pad(cursor.m+1)} - {addMonths(cursor,1).y}.{pad(addMonths(cursor,1).m+1)}</span>
              <button onClick={()=>changeMonth(1)}>›</button>
            </div>
          )}
        </div>
      </div>

      {view==="month" ? (
        <>
          <div className="cal-two-month">
            {renderMonthCard(cursor)}
            {renderMonthCard(addMonths(cursor, 1))}
          </div>

          <div className="card cal-legend-card">
            <div className="cal-legend">
              {projectItems.map(p => (
                <span className="legend-item" key={p.id}>
                  <span className="legend-dot" style={{background: siteColorMap[p.siteId]}} />
                  {siteById[p.siteId]?.name} (전체공사)
                </span>
              ))}
              {trades.map(t => (
                <span className="legend-item" key={t.id}><span className="legend-dot" style={{background:t.color}} />{t.name}</span>
              ))}
            </div>
          </div>

          {selectedDate && (
            <div className="daypanel">
              <p className="eyebrow">{selectedDate}</p>
              {projectItems.filter(p => { const {start,end} = scheduleRange(p); return selectedDate>=start && selectedDate<=end; }).map(p => (
                <div className="tag ok" key={p.id} style={{marginBottom:8, display:"inline-block"}}>
                  🗂 {siteById[p.siteId]?.name} 전체 공사기간 진행 중
                </div>
              ))}
              {schedulesOn(selectedDate).length===0 ? (
                <div className="empty">이 날짜에 진행 중인 공사가 없습니다.</div>
              ) : (
                schedulesOn(selectedDate).map(sc => (
                  <ScheduleRow key={sc.id} sc={sc} trade={tradeById[sc.tradeId]} site={siteById[sc.siteId]} onDelete={()=>setSchedules(prev=>prev.filter(s=>s.id!==sc.id))} />
                ))
              )}
            </div>
          )}
        </>
      ) : (
        <div className="card">
          {agendaGroups.length===0 ? (
            <div className="empty">등록된 일정이 없습니다. 현장관리 탭에서 공사별 기간을 추가해보세요.</div>
          ) : (
            agendaGroups.map(([monthKey, items]) => (
              <div className="agenda-group" key={monthKey}>
                <p className="agenda-month">{monthKey.replace("-", "년 ")}월</p>
                {items.map(sc => {
                  const isProject = sc.isProject;
                  const trade = isProject ? null : tradeById[sc.tradeId];
                  const site = siteById[sc.siteId];
                  const contact = isProject ? null : trade?.contacts.find(c=>c.id===sc.contactId);
                  const { start, end } = scheduleRange(sc);
                  const d = new Date(start + "T00:00:00");
                  const isPast = end < todayFull;
                  const span = daySpan(sc);
                  return (
                    <div className={"agenda-item" + (isPast ? " past" : "")} key={sc.id}>
                      <span className="agenda-swatch" style={{background: isProject ? "var(--navy-deep)" : trade?.color}} />
                      <div className="agenda-date">
                        {d.getDate()}
                        <span className="dow">{DOW[d.getDay()]}</span>
                      </div>
                      <div className="agenda-body">
                        <div className="agenda-title">{isProject ? `🗂 ${site?.name} 전체 공사기간` : `${trade?.name} · ${site?.name}`}</div>
                        <div className="agenda-sub">
                          {start}{end!==start && ` ~ ${end}`} ({span}일)
                          {!isProject && <> · 담당자: {contact?.name || "미지정"} {contact?.phone && `· ${contact.phone}`} {sc.memo && `· ${sc.memo}`}</>}
                        </div>
                      </div>
                      {!isProject && <button className="btn btn-danger btn-sm" onClick={()=>setSchedules(prev=>prev.filter(s=>s.id!==sc.id))}>삭제</button>}
                    </div>
                  );
                })}
              </div>
            ))
          )}
        </div>
      )}
    </div>
  );
}

function ScheduleRow({ sc, trade, site, onDelete }){
  const contact = trade?.contacts.find(c=>c.id===sc.contactId);
  const { start, end } = scheduleRange(sc);
  const span = daySpan(sc);
  return (
    <div className="day-sched">
      <span className="swatch-bar" style={{background: trade?.color}} />
      <div style={{flex:1}}>
        <div style={{fontWeight:800, fontSize:14}}>{trade?.name} · {site?.name}</div>
        <div style={{fontSize:13, color:"var(--ink-soft)"}}>
          {start}{end!==start && ` ~ ${end}`} ({span}일) · 담당자: {contact?.name || "미지정"} {contact?.phone && `· ${contact.phone}`}
        </div>
        {sc.memo && <div style={{fontSize:12.5, color:"var(--ink-soft)", marginTop:2}}>메모: {sc.memo}</div>}
      </div>
      <button className="btn btn-danger btn-sm" onClick={onDelete}>삭제</button>
    </div>
  );
}

/* ---------- Contacts tab ---------- */
function ContactsTab({ trades, setTrades, schedules, setSchedules }){
  const [showAddTrade, setShowAddTrade] = useState(false);

  function updateContact(tradeId, contactId, patch){
    setTrades(prev => prev.map(t => t.id!==tradeId ? t : {
      ...t, contacts: t.contacts.map(c => c.id===contactId ? {...c, ...patch} : c)
    }));
  }
  function addContact(tradeId){
    setTrades(prev => prev.map(t => t.id!==tradeId ? t : {
      ...t, contacts: [...t.contacts, {id: uid(), name:"", phone:"", bank:"", account:"", isDefault:false}]
    }));
  }
  function deleteContact(tradeId, contactId){
    setTrades(prev => prev.map(t => {
      if(t.id!==tradeId) return t;
      if(t.contacts.length<=1){ alert("최소 1명의 담당자는 유지해야 합니다."); return t; }
      return {...t, contacts: t.contacts.filter(c=>c.id!==contactId)};
    }));
  }
  function makeDefault(tradeId, contactId){
    setTrades(prev => prev.map(t => t.id!==tradeId ? t : {
      ...t, contacts: t.contacts.map(c => ({...c, isDefault: c.id===contactId}))
    }));
  }
  function addTrade({ name, note, contactName, phone, bank, account }){
    const color = nextTradeColor(trades.map(t=>t.color));
    const newTrade = {
      id: "trade-" + uid(),
      name, color, note,
      contacts: [{ id: uid(), name: contactName, phone, bank, account, isDefault: true }],
    };
    setTrades(prev => [...prev, newTrade]);
    setShowAddTrade(false);
  }
  function deleteTrade(tradeId, tradeName){
    if(!confirm(`"${tradeName}" 공정을 삭제하면 관련된 일정도 함께 삭제됩니다. 계속할까요?`)) return;
    setTrades(prev => prev.filter(t => t.id!==tradeId));
    setSchedules(prev => prev.filter(sc => sc.tradeId!==tradeId));
  }

  return (
    <div>
      <div className="section-head">
        <div>
          <p className="eyebrow">CONTACTS</p>
          <h2>공사별 담당자</h2>
        </div>
        <button className="btn btn-accent" onClick={()=>setShowAddTrade(true)}>+ 공정 추가</button>
      </div>

      {trades.map(trade => (
        <div className="card contact-card" key={trade.id}>
          <div className="contact-head">
            <span className="trade-swatch" style={{background:trade.color}} />
            <h4 style={{flex:1}}>{trade.name}</h4>
            <button className="btn btn-danger btn-sm" onClick={()=>deleteTrade(trade.id, trade.name)}>공정 삭제</button>
          </div>
          <p className="contact-note">{trade.note}</p>

          {trade.contacts.map(c => (
            <div className="contact-item" key={c.id}>
              <input type="text" value={c.name} placeholder="이름" onChange={e=>updateContact(trade.id, c.id, {name:e.target.value})} />
              <input type="text" value={c.phone} placeholder="전화번호" onChange={e=>updateContact(trade.id, c.id, {phone:e.target.value})} />
              <input type="text" value={c.bank} placeholder="은행" onChange={e=>updateContact(trade.id, c.id, {bank:e.target.value})} />
              <input type="text" value={c.account} placeholder="계좌번호" onChange={e=>updateContact(trade.id, c.id, {account:e.target.value})} />
              <div style={{display:"flex", gap:6, alignItems:"center", justifyContent:"flex-end"}}>
                {c.isDefault ? <span className="default-badge">기본</span> : (
                  <button className="btn btn-ghost btn-sm" onClick={()=>makeDefault(trade.id, c.id)}>기본으로</button>
                )}
                <button className="btn btn-danger btn-sm" onClick={()=>deleteContact(trade.id, c.id)}>✕</button>
              </div>
            </div>
          ))}

          <button className="btn btn-ghost btn-sm" style={{marginTop:10}} onClick={()=>addContact(trade.id)}>+ 담당자 추가</button>
        </div>
      ))}

      {showAddTrade && <AddTradeModal onClose={()=>setShowAddTrade(false)} onSave={addTrade} />}
    </div>
  );
}

function AddTradeModal({ onClose, onSave }){
  const [name, setName] = useState("");
  const [note, setNote] = useState("");
  const [contactName, setContactName] = useState("");
  const [phone, setPhone] = useState("");
  const [bank, setBank] = useState("");
  const [account, setAccount] = useState("");

  function submit(){
    if(!name.trim()){ alert("공정 이름을 입력해주세요."); return; }
    onSave({
      name: name.trim(), note: note.trim(),
      contactName: contactName.trim(), phone: phone.trim(), bank: bank.trim(), account: account.trim(),
    });
  }

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-head">
          <h3>새 공정 추가</h3>
          <button className="close-x" onClick={onClose}>✕</button>
        </div>
        <div className="field">
          <label>공정 이름</label>
          <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="예: 메지" />
        </div>
        <div className="field">
          <label>진행 방식 메모</label>
          <input type="text" value={note} onChange={e=>setNote(e.target.value)} placeholder="예: 타일 시공 후 도면/주소 주고 날짜 잡음" />
        </div>
        <div className="row2">
          <div className="field">
            <label>기본 담당자 이름</label>
            <input type="text" value={contactName} onChange={e=>setContactName(e.target.value)} placeholder="이름" />
          </div>
          <div className="field">
            <label>연락처</label>
            <input type="text" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="010-0000-0000" />
          </div>
          <div className="field">
            <label>은행 (선택)</label>
            <input type="text" value={bank} onChange={e=>setBank(e.target.value)} placeholder="예: 국민" />
          </div>
          <div className="field">
            <label>계좌번호 (선택)</label>
            <input type="text" value={account} onChange={e=>setAccount(e.target.value)} placeholder="계좌번호" />
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>취소</button>
          <button className="btn btn-primary" onClick={submit}>추가</button>
        </div>
      </div>
    </div>
  );
}

/* ---------- Vendors tab (거래처관리) ---------- */
function VendorsTab({ vendors, setVendors }){
  const [showAdd, setShowAdd] = useState(false);

  function addVendor(v){
    setVendors(prev => [...prev, { ...v, id: uid() }]);
    setShowAdd(false);
  }
  function updateVendor(id, patch){
    setVendors(prev => prev.map(v => v.id===id ? {...v, ...patch} : v));
  }
  function deleteVendor(id){
    if(!confirm("이 거래처 정보를 삭제할까요?")) return;
    setVendors(prev => prev.filter(v => v.id!==id));
  }

  return (
    <div>
      <div className="section-head">
        <div>
          <p className="eyebrow">VENDORS</p>
          <h2>거래처 / 업체 정보</h2>
        </div>
        <button className="btn btn-accent" onClick={()=>setShowAdd(true)}>+ 업체 추가</button>
      </div>

      {vendors.length===0 ? (
        <div className="empty"><b>등록된 거래처가 없습니다.</b><br/>자재상, 조명, 기타 협력업체 등 공정에 속하지 않는 업체 정보를 등록해보세요.</div>
      ) : (
        <div className="card">
          {vendors.map(v => (
            <div className="vendor-item" key={v.id}>
              <input type="text" value={v.name} placeholder="업체명" onChange={e=>updateVendor(v.id, {name:e.target.value})} />
              <input type="text" value={v.phone} placeholder="전화번호" onChange={e=>updateVendor(v.id, {phone:e.target.value})} />
              <input type="text" value={v.memo} placeholder="메모 (담당자, 품목 등)" onChange={e=>updateVendor(v.id, {memo:e.target.value})} />
              <button className="btn btn-danger btn-sm" onClick={()=>deleteVendor(v.id)}>✕</button>
            </div>
          ))}
        </div>
      )}

      {showAdd && <VendorFormModal onClose={()=>setShowAdd(false)} onSave={addVendor} />}
    </div>
  );
}

function VendorFormModal({ onClose, onSave }){
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [memo, setMemo] = useState("");

  function submit(){
    if(!name.trim()){ alert("업체명을 입력해주세요."); return; }
    onSave({ name: name.trim(), phone: phone.trim(), memo: memo.trim() });
  }

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-head">
          <h3>거래처 추가</h3>
          <button className="close-x" onClick={onClose}>✕</button>
        </div>
        <div className="field">
          <label>업체명</label>
          <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="예: 한빛조명" />
        </div>
        <div className="field">
          <label>전화번호</label>
          <input type="text" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="예: 010-1234-5678" />
        </div>
        <div className="field">
          <label>메모</label>
          <input type="text" value={memo} onChange={e=>setMemo(e.target.value)} placeholder="담당자, 취급 품목 등" />
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>취소</button>
          <button className="btn btn-primary" onClick={submit}>저장</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

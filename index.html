/* ---------- Labor tab (담당자관리 — 품수 집계) ---------- */
function LaborTab({ trades, sites, schedules }){
  const [cursor, setCursor] = useState(() => { const d = new Date(); return {y: d.getFullYear(), m: d.getMonth()}; });

  function changeMonth(delta){
    setCursor(prev => {
      let nm = prev.m + delta, ny = prev.y;
      while(nm<0){ nm+=12; ny--; }
      while(nm>11){ nm-=12; ny++; }
      return { y: ny, m: nm };
    });
  }

  const monthStart = `${cursor.y}-${pad(cursor.m+1)}-01`;
  const monthEnd = `${cursor.y}-${pad(cursor.m+1)}-${pad(new Date(cursor.y, cursor.m+1, 0).getDate())}`;
  const tradeById = Object.fromEntries(trades.map(t=>[t.id,t]));

  const monthSchedules = schedules.filter(sc => {
    const { start, end } = scheduleRange(sc);
    return start<=monthEnd && end>=monthStart;
  });

  const grouped = {};
  monthSchedules.forEach(sc => {
    const trade = tradeById[sc.tradeId];
    if(!trade) return;
    const contact = trade.contacts.find(c => c.id===sc.contactId);
    const names = splitWorkerNames(sc.workerName);
    const workerNames = names.length ? names : [contact?.name || "작업자 미입력"];
    if(!grouped[trade.id]) grouped[trade.id] = { trade, contacts: {} };
    workerNames.forEach(workerName => {
      if(!grouped[trade.id].contacts[workerName]) grouped[trade.id].contacts[workerName] = { units: 0, count: 0 };
      grouped[trade.id].contacts[workerName].units += (sc.laborUnits || 0);
      grouped[trade.id].contacts[workerName].count += 1;
    });
  });

  const groupList = trades.map(t => grouped[t.id]).filter(Boolean);
  const grandTotal = groupList.reduce((sum, g) => sum + Object.values(g.contacts).reduce((s,c) => s+c.units, 0), 0);

  return (
    <div>
      <div className="section-head">
        <div>
          <p className="eyebrow">LABOR / 품수 집계</p>
          <h2>담당자 품수 관리</h2>
        </div>
        <div className="cal-nav">
          <button onClick={()=>changeMonth(-1)}>‹</button>
          <span className="cal-month">{cursor.y}. {pad(cursor.m+1)}</span>
          <button onClick={()=>changeMonth(1)}>›</button>
        </div>
      </div>

      <p style={{fontSize:13, color:"var(--ink-soft)", marginBottom:16, maxWidth:640}}>
        캘린더에서 일정을 추가·수정할 때 입력한 <b>품수(0.5 단위)</b>를 공정별·담당자별로 이번 달 기준 합산합니다. 일당 계산할 때 참고하세요.
      </p>

      {groupList.length===0 ? (
        <div className="empty">이번 달에 품수가 입력된 일정이 없습니다.<br/>캘린더에서 일정을 추가하거나 수정할 때 "품수" 칸에 값을 넣어보세요.</div>
      ) : (
        <>
          {groupList.map(g => (
            <div className="card" style={{marginBottom:12}} key={g.trade.id}>
              <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:10}}>
                <span className="trade-swatch" style={{background:g.trade.color}} />
                <h4 style={{margin:0, fontSize:15}}>{g.trade.name}</h4>
              </div>
              {Object.entries(g.contacts).map(([name, data]) => (
                <div key={name} style={{display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 2px", borderTop:"1px solid var(--paper-line)", fontSize:13.5}}>
                  <span>{name}</span>
                  <span style={{fontFamily:"var(--mono)", fontWeight:800, color:"var(--navy)"}}>{data.units}품 <span style={{color:"var(--ink-soft)", fontWeight:600}}>({data.count}건)</span></span>
                </div>
              ))}
            </div>
          ))}
          <div className="card" style={{background:"var(--navy-deep)", color:"#fff"}}>
            <div style={{display:"flex", justifyContent:"space-between", fontWeight:800, fontSize:14}}>
              <span>이번 달 전체 합계</span>
              <span style={{fontFamily:"var(--mono)"}}>{grandTotal}품</span>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

function WorkerMultiSelect({ workers, selected, onChange }){
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    function handleOutside(e){ if(ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", handleOutside);
    return () => document.removeEventListener("mousedown", handleOutside);
  }, []);

  const allSelected = selected===null;
  const isChecked = w => allSelected || selected.includes(w);
  const count = allSelected ? workers.length : selected.length;
  const label = workers.length===0 ? "담당자 없음"
    : allSelected ? "전체 담당자"
    : count===0 ? "담당자 선택"
    : count===1 ? selected[0]
    : `담당자 ${count}명`;

  function toggle(w){
    if(allSelected){
      onChange(workers.filter(x=>x!==w));
    } else {
      const next = selected.includes(w) ? selected.filter(x=>x!==w) : [...selected, w];
      onChange(next.length===workers.length ? null : next);
    }
  }

  return (
    <div className="site-multiselect" ref={ref}>
      <button type="button" className="site-multiselect-btn" onClick={()=>setOpen(o=>!o)}>{label} ▾</button>
      {open && (
        <div className="site-multiselect-panel">
          <div className="site-multiselect-actions">
            <button type="button" onClick={()=>onChange(null)}>전체 선택</button>
            <button type="button" onClick={()=>onChange([])}>전체 해제</button>
          </div>
          {workers.length===0 ? (
            <p className="site-multiselect-empty">등록된 담당자가 없습니다</p>
          ) : workers.map(w => (
            <label className="site-multiselect-item" key={w}>
              <input type="checkbox" checked={isChecked(w)} onChange={()=>toggle(w)} />
              {w}
            </label>
          ))}
        </div>
      )}
    </div>
  );
}

/* ---------- Worker schedule tab (담당자 일정 — 날짜×담당자 매트릭스) ---------- */
function WorkerScheduleTab({ trades, sites, schedules }){
  const [cursor, setCursor] = useState(() => { const d = new Date(); return {y: d.getFullYear(), m: d.getMonth()}; });
  const [selectedWorkers, setSelectedWorkers] = useState(null); // null = all

  const tradeById = Object.fromEntries(trades.map(t=>[t.id,t]));
  const siteById = Object.fromEntries(sites.map(s=>[s.id,s]));
  const siteColorMap = Object.fromEntries(sites.map((s,i) => [s.id, PROJECT_COLOR_POOL[i % PROJECT_COLOR_POOL.length]]));

  function workerNamesOf(sc){
    const trade = tradeById[sc.tradeId];
    const contact = trade?.contacts.find(c => c.id===sc.contactId);
    const names = splitWorkerNames(sc.workerName);
    return names.length ? names : (contact?.name ? [contact.name] : []);
  }

  const allWorkers = useMemo(() => {
    const set = new Set();
    schedules.forEach(sc => { workerNamesOf(sc).forEach(n => set.add(n)); });
    return Array.from(set).sort();
  }, [schedules, trades]);

  // custom column order (drag-to-reorder), persisted locally; new workers are appended,
  // removed workers drop out automatically
  const [workerOrder, setWorkerOrder] = useState(() => loadLS("scheduler:workerOrder", []));
  useEffect(() => { saveLS("scheduler:workerOrder", workerOrder); }, [workerOrder]);
  useEffect(() => {
    setWorkerOrder(prev => {
      const kept = prev.filter(w => allWorkers.includes(w));
      const added = allWorkers.filter(w => !kept.includes(w));
      const next = [...kept, ...added];
      const changed = next.length!==prev.length || next.some((w,i) => w!==prev[i]);
      return changed ? next : prev;
    });
  }, [allWorkers.join("|")]);

  const [dragOverWorker, setDragOverWorker] = useState(null);
  function reorderWorkers(draggedName, targetName){
    if(draggedName===targetName) return;
    setWorkerOrder(prev => {
      const next = prev.filter(w => w!==draggedName);
      const idx = next.indexOf(targetName);
      next.splice(idx===-1 ? next.length : idx, 0, draggedName);
      return next;
    });
  }

  const orderedAllWorkers = workerOrder.length ? workerOrder : allWorkers;
  const workers = selectedWorkers===null ? orderedAllWorkers : orderedAllWorkers.filter(w => selectedWorkers.includes(w));

  function changeMonth(delta){
    setCursor(prev => {
      let nm = prev.m + delta, ny = prev.y;
      while(nm<0){ nm+=12; ny--; }
      while(nm>11){ nm-=12; ny++; }
      return { y: ny, m: nm };
    });
  }

  const nextCursor = cursor.m>=11 ? { y: cursor.y+1, m: 0 } : { y: cursor.y, m: cursor.m+1 };
  const rangeStart = new Date(cursor.y, cursor.m, 1);
  const rangeEnd = new Date(nextCursor.y, nextCursor.m+1, 0); // last day of the second month
  const totalDays = Math.round((rangeEnd - rangeStart) / 86400000) + 1;
  const dateList = Array.from({length: totalDays}, (_, i) => {
    const d = new Date(rangeStart); d.setDate(d.getDate()+i);
    const dateStr = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    return { day: d.getDate(), month: d.getMonth()+1, dateStr, dow: d.getDay() };
  });

  function siteForWorkerOnDate(worker, dateStr){
    const sc = schedules.find(sc => {
      if(!workerNamesOf(sc).includes(worker)) return false;
      const { start, end } = scheduleRange(sc);
      return dateStr>=start && dateStr<=end;
    });
    if(!sc) return null;
    return siteById[sc.siteId] || null;
  }

  const [showEmptyDates, setShowEmptyDates] = useState(false);
  const activeDates = dateList.filter(d => workers.some(w => siteForWorkerOnDate(w, d.dateStr)));
  const visibleDateList = showEmptyDates || activeDates.length===0
    ? (showEmptyDates ? dateList : activeDates)
    : dateList.filter(d => d.dateStr>=activeDates[0].dateStr && d.dateStr<=activeDates[activeDates.length-1].dateStr);
  return (
    <div>
      <div className="section-head">
        <div>
          <p className="eyebrow">LABOR SCHEDULE</p>
          <h2>담당자별 일정</h2>
        </div>
        <div style={{display:"flex", gap:10, alignItems:"center", flexWrap:"wrap"}}>
          <WorkerMultiSelect workers={orderedAllWorkers} selected={selectedWorkers} onChange={setSelectedWorkers} />
          <label style={{display:"flex", alignItems:"center", gap:6, fontSize:12.5, color:"var(--ink-soft)", cursor:"pointer"}}>
            <input type="checkbox" checked={showEmptyDates} onChange={e=>setShowEmptyDates(e.target.checked)} />
            빈 날짜도 표시
          </label>
          <div className="cal-nav">
            <button onClick={()=>changeMonth(-1)}>‹</button>
            <span className="cal-month">{cursor.y}.{pad(cursor.m+1)} - {nextCursor.y}.{pad(nextCursor.m+1)}</span>
            <button onClick={()=>changeMonth(1)}>›</button>
          </div>
        </div>
      </div>

      <p style={{fontSize:13, color:"var(--ink-soft)", marginBottom:16, maxWidth:640}}>
        선택한 담당자가 날짜별로 어느 현장에 있는지 한눈에 봅니다. 셀 색상은 현장별 색상과 같습니다.
      </p>

      {workers.length===0 ? (
        <div className="empty">표시할 담당자가 없습니다. 위에서 담당자를 선택해주세요.</div>
      ) : visibleDateList.length===0 ? (
        <div className="empty">이번 달엔 선택한 담당자의 일정이 없습니다.<br/>"빈 날짜도 표시"를 체크하면 전체 날짜를 볼 수 있어요.</div>
      ) : (
        <div className="card" style={{overflowX:"auto", padding:0}}>
          <table className="worker-sched-table">
            <thead>
              <tr>
                <th>날짜</th>
                <th>요일</th>
                {workers.map(w => (
                  <th
                    key={w}
                    className={dragOverWorker===w ? "th-drag-over" : ""}
                    draggable
                    title="드래그해서 순서 변경"
                    onDragStart={e=>{ e.dataTransfer.effectAllowed="move"; e.dataTransfer.setData("text/plain", w); }}
                    onDragOver={e=>e.preventDefault()}
                    onDragEnter={e=>{ e.preventDefault(); setDragOverWorker(w); }}
                    onDragLeave={()=>{ if(dragOverWorker===w) setDragOverWorker(null); }}
                    onDrop={e=>{ e.preventDefault(); setDragOverWorker(null); reorderWorkers(e.dataTransfer.getData("text/plain"), w); }}
                    onDragEnd={()=>setDragOverWorker(null)}
                  >
                    {w}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {visibleDateList.map(d => (
                <tr key={d.dateStr} className={d.dow===0 ? "row-sun" : d.dow===6 ? "row-sat" : ""}>
                  <td>{d.month}/{d.day}</td>
                  <td>{DOW[d.dow]}</td>
                  {workers.map(w => {
                    const site = siteForWorkerOnDate(w, d.dateStr);
                    return (
                      <td
                        key={w}
                        style={site ? { background: siteColorMap[site.id]+"38", color:"var(--ink)", fontWeight:700 } : {}}
                        title={site ? site.name : ""}
                      >
                        {site ? (site.abbreviation || site.name.slice(0,2)) : ""}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {sites.length>0 && (
        <div className="cal-legend" style={{marginTop:14}}>
          {sites.map(s => (
            <span className="legend-item" key={s.id}>
              <span className="legend-dot" style={{background:siteColorMap[s.id]}} />
              {s.abbreviation || s.name.slice(0,2)} = {s.name}
            </span>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
